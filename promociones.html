<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menú de Promociones Especiales - Gayosso</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login-overlay" class="login-overlay">
    <div class="login-box">
        <img src="logoalta.png" alt="Gayosso" style="height: 60px; margin-bottom: 20px;">
        <h2>Acceso Restringido</h2>
        <div class="input-group">
            <input type="text" id="login-user" placeholder="Usuario">
        </div>
        <div class="input-group" style="margin-top: 15px;">
            <input type="password" id="login-pass" placeholder="Contraseña">
        </div>
        <button class="btn-generate" style="margin-top: 20px; margin-bottom: 0;" onclick="verificarAcceso()">Ingresar</button>
        <p id="login-error" style="color: #c0392b; display: none; margin-top: 15px; font-weight: bold;">Credenciales incorrectas</p>
    </div>
</div>

<header class="main-header">
    <div class="header-content">
        <div class="logo-container">
            <img id="logo-preview" src="logoalta.png" alt="Logo Gayosso">
        </div>
        <div class="header-titles">
            <h1>Cotizador Institucional</h1>
            <nav class="nav-buttons">
                <a href="index.html" class="nav-btn">Inicio</a>
                <a href="promociones.html" class="nav-btn active">Promociones Especiales</a>
            </nav>
        </div>
    </div>
</header>

<main class="container">
    <h2 style="text-align: center; font-size: 2.2rem; color: var(--primary); border: none; display: block; margin-bottom: 5px;">Selecciona la Promoción Especial</h2>
    <p style="text-align: center; color: #666; font-size: 1.1rem; margin-bottom: 40px;">Elige el esquema para generar la cotización</p>
    
    <div class="promo-menu">
        <a href="promo_3x2.html" class="promo-box-link">
            <h2>3x2</h2>
            <p>Paga 2, Lleva 3</p>
        </a>
        <a href="promo_4x2.html" class="promo-box-link">
            <h2>4x2</h2>
            <p>Paga 2, Lleva 4</p>
        </a>
    </div>
</main>

<script src="script.js?v=8"></script>
</body>
</html>
